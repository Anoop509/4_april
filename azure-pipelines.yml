trigger:
- none
pool:
  name: poolofanoop

steps:

- task: TerraformInstaller@1
  inputs:
    terraformVersion: 'latest'

- task: TerraformTask@5
  inputs:
    provider: 'azurerm'
    command: 'init'
    backendAzureRmUseCliFlagsForAuthentication: true
    backendServiceArm: 'anoopservice2'
    backendAzureRmResourceGroupName: 'anoop_re'
    backendAzureRmStorageAccountName: 'anoopstore112233'
    backendAzureRmContainerName: 'anoopcont'
    backendAzureRmKey: 'appu.tfstate'
- task: TerraformTask@5
  inputs:
    provider: 'azurerm'
    command: 'validate'

- task: TerraformTask@5
  inputs:
    provider: 'azurerm'
    command: 'plan'
    environmentServiceNameAzureRM: 'anoopservice2'

- task: TerraformTask@5
  inputs:
    provider: 'azurerm'
    command: 'apply'
    commandOptions: '--auto-approve'
    environmentServiceNameAzureRM: 'anoopservice2'